name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen --all-extras --all-groups

      - name: Run tests
        run: uv run pytest

      - name: Lint
        run: uv run ruff check .

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/quit-smoke-bot

            # Pull latest code
            git pull origin main

            # Build new images WITHOUT stopping running containers
            docker compose build

            # Run migrations while old bot is still running
            docker compose run --rm migrate

            # Swap to new containers (~2s downtime instead of ~30s)
            docker compose up -d --no-build --remove-orphans

            # Wait and healthcheck
            sleep 5
            for svc in bot worker scheduler; do
              if ! docker compose ps --format '{{.Name}} {{.Status}}' | grep "$svc" | grep -q "Up"; then
                echo "FAIL: $svc is not running"
                docker compose logs "$svc" --tail=20
                exit 1
              fi
            done
            echo "All services healthy"

            # Cleanup old images
            docker image prune -f

      - name: Notify Telegram (success)
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.ADMIN_CHAT_ID }} \
            -d parse_mode=HTML \
            -d text="✅ <b>Deploy successful</b>%0A<code>${GITHUB_SHA::7}</code> — ${GITHUB_ACTOR}"

      - name: Notify Telegram (failure)
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.ADMIN_CHAT_ID }} \
            -d parse_mode=HTML \
            -d text="❌ <b>Deploy failed</b>%0A<code>${GITHUB_SHA::7}</code> — ${GITHUB_ACTOR}%0A<a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Logs</a>"
