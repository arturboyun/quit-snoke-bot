name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen --all-extras --all-groups

      - name: Run tests
        run: uv run pytest

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/quit-smoke-bot

            # Pull latest code
            git pull origin main

            # Build and deploy
            docker compose up --build -d

            # Wait for bot to start
            sleep 10

            # Healthcheck: verify all services are running
            for svc in bot worker scheduler; do
              if ! docker compose ps --format '{{.Name}} {{.Status}}' | grep "$svc" | grep -q "Up"; then
                echo "FAIL: $svc is not running"
                docker compose logs "$svc" --tail=20
                exit 1
              fi
            done
            echo "All services healthy"

            # Cleanup old images
            docker image prune -f
